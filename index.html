<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Денис Волошин — Project Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            word-wrap: break-word;
        }

        html, body {
            overflow-x: hidden;
            max-width: 100%;
        }

        :root {
            --primary: #0a1628;
            --secondary: #111d32;
            --accent: #ff6b4a;
            --accent-glow: rgba(255, 107, 74, 0.3);
            --text-primary: #ffffff;
            --text-secondary: #8a9bb8;
            --text-muted: #5a6a85;
            --border: #1e3a5f;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        img, svg, video {
            max-width: 100%;
            height: auto;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 380px 1fr;
            min-height: 100vh;
        }

        .sidebar {
            background: var(--secondary);
            padding: 60px 40px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .sidebar::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 70%, var(--accent-glow) 0%, transparent 50%);
            animation: pulse 8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .profile-section {
            position: relative;
            z-index: 1;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .name {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff 0%, #8a9bb8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .title {
            font-size: 14px;
            font-weight: 500;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--text-muted);
            margin-bottom: 25px;
            position: relative;
            padding-bottom: 15px;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 40px;
            height: 2px;
            background: var(--accent);
        }

        .skills-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 50px;
        }

        .skill-item {
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .skill-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 8px;
        }

        .skill-desc {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .main-content {
            padding: 60px 40px;
            position: relative;
        }

        .hero-text {
            max-width: 100%;
        }

        .stats-grid {
            gap: 20px;
        }

        .artist-tag {
            white-space: normal;
        }

        /* 🔥 ВОТ ТВОЙ ФИКС (ДОБАВИЛ В КОНЕЦ) */
        * {
            max-width: 100%;
            box-sizing: border-box;
        }

        html, body {
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .container {
            display: grid;
            grid-template-columns: 380px 1fr;
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        * {
            word-break: break-word;
        }

    </style>
    <base target="_blank">
</head>
<body>
    <div class="container">
        <!-- ВЕСЬ ТВОЙ КОНТЕНТ -->
    </div>
</body>
</html>
